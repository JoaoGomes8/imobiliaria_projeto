<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusitânia Astral | Registo de Descoberta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-slate-800 shadow-lg">
        <nav class="container mx-auto p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-bold text-blue-400 text-center sm:text-left">🚀 Lusitânia Astral</div>
            <ul class="flex flex-wrap justify-center space-x-4 sm:space-x-6 text-sm sm:text-base">
                <li><a href="index.html" class="hover:text-blue-300 transition-colors">Montra Galáctica</a></li>
                <li><a href="comando.html" class="hover:text-blue-300 transition-colors text-blue-400">Centro de Comando</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto p-6 mt-8 max-w-4xl">
        <section class="bg-slate-800 p-8 rounded-xl shadow-lg border border-slate-700">
            <h1 id="titulo-formulario" class="text-3xl font-bold text-white mb-8 border-b border-slate-700 pb-4">Registar Nova Descoberta</h1>
            
            <form id="formulario-planeta" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="nome" class="block text-sm font-medium text-slate-300 mb-1">Nome do Planeta *</label>
                        <input type="text" id="nome" name="nome" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                    <div>
                        <label for="vendedor" class="block text-sm font-medium text-slate-300 mb-1">Vendedor</label>
                        <input type="text" id="vendedor" name="vendedor" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="preco" class="block text-sm font-medium text-slate-300 mb-1">Preço (BTC) *</label>
                        <input type="number" id="preco" name="preco" required min="0" step="0.01" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                    <div>
                        <label for="galaxia" class="block text-sm font-medium text-slate-300 mb-1">Galáxia</label>
                        <input type="text" id="galaxia" name="galaxia" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                    <div>
                        <label for="sistema_estrelar" class="block text-sm font-medium text-slate-300 mb-1">Sistema Estrelar</label>
                        <input type="text" id="sistema_estrelar" name="sistema_estrelar" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                </div>

                <div>
                    <label for="descricao" class="block text-sm font-medium text-slate-300 mb-1">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="3" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                    <div>
                        <label for="parcela" class="block text-sm font-medium text-slate-300 mb-1">Parcela de Venda</label>
                        <select id="parcela" name="parcela" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                            <option value="todo">Planeta Inteiro</option>
                            <option value="hemisferio">Hemisfério</option>
                            <option value="zona">Zona Específica</option>
                        </select>
                    </div>
                    <div>
                        <label for="area_total" class="block text-sm font-medium text-slate-300 mb-1">Área Total (km²)</label>
                        <input type="number" id="area_total" name="area_total" required min="0" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                    <div>
                        <label for="area_util" class="block text-sm font-medium text-slate-300 mb-1">Área Útil (km²)</label>
                        <input type="number" id="area_util" name="area_util" required min="0" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                    <div>
                        <label for="fauna" class="block text-sm font-medium text-slate-300 mb-1">Fauna</label>
                        <select id="fauna" name="fauna" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                            <option value="none">Nenhuma</option>
                            <option value="terrestre">Terrestre</option>
                            <option value="aviario">Aviário</option>
                            <option value="aquatico">Aquático</option>
                            <option value="marisco">Marisco</option>
                            <option value="insetos">Insetos</option>
                        </select>
                    </div>
                    <div>
                        <label for="flora" class="block text-sm font-medium text-slate-300 mb-1">Flora</label>
                        <select id="flora" name="flora" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                            <option value="none">Nenhuma</option>
                            <option value="madeireira">Madeireira</option>
                            <option value="ornamental">Ornamental</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Geologia (Múltiplos)</label>
                        <div class="space-y-2">
                            <label class="inline-flex items-center mr-4"><input type="checkbox" name="geologia" value="minerio" class="mr-2"> Minério</label>
                            <label class="inline-flex items-center mr-4"><input type="checkbox" name="geologia" value="gas" class="mr-2"> Gás</label>
                            <label class="inline-flex items-center"><input type="checkbox" name="geologia" value="liquido" class="mr-2"> Líquido</label>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="block text-sm font-medium text-slate-300">URLs das Fotos</label>
                        <button type="button" id="adicionar-foto-btn" class="text-sm bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded transition-colors">
                            + Adicionar Foto
                        </button>
                    </div>
                    <div id="container-fotos" class="space-y-3">
                        <input type="url" class="foto-url w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500" placeholder="https://..." data-foto-index="0">
                    </div>
                </div>

                <div>
                    <label for="vendido" class="block text-sm font-medium text-slate-300 mb-1">Estado</label>
                    <select id="vendido" name="vendido" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500">
                        <option value="false">Disponível</option>
                        <option value="true">Vendido</option>
                    </select>
                </div>

                <div class="flex justify-end space-x-4 pt-6 border-t border-slate-700">
                    <a href="comando.html" class="px-6 py-2 rounded-lg text-slate-300 hover:bg-slate-700 transition-colors">Cancelar</a>
                    <button type="submit" class="px-6 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-bold transition-colors">
                        Guardar Registo
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
