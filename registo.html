<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusitânia Astral | Registo de Descoberta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-slate-800 shadow-lg">
        <nav class="container mx-auto p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-bold text-blue-400 text-center sm:text-left">🚀 Lusitânia Astral</div>
            <ul class="flex flex-wrap justify-center space-x-4 sm:space-x-6 text-sm sm:text-base">
                <li><a href="index.html" class="hover:text-blue-300 transition-colors">Montra Galáctica</a></li>
                <li><a href="comando.html" class="hover:text-blue-300 transition-colors text-blue-400">Centro de Comando</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto p-6 mt-8 max-w-3xl">
        <section class="bg-slate-800 p-8 rounded-xl shadow-lg border border-slate-700">
            <h1 id="titulo-formulario" class="text-3xl font-bold text-white mb-6">Registar Nova Descoberta</h1>
            
            <form id="formulario-planeta" class="space-y-6">
                
                <div>
                    <label for="nome" class="block text-sm font-medium text-slate-300 mb-1">Nome do Planeta *</label>
                    <input type="text" id="nome" name="nome" required 
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="preco" class="block text-sm font-medium text-slate-300 mb-1">Preço (BTC) *</label>
                        <input type="number" id="preco" name="preco" required min="0" step="0.01"
                               class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label for="galaxia" class="block text-sm font-medium text-slate-300 mb-1">Galáxia</label>
                        <input type="text" id="galaxia" name="galaxia" required
                               class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div>
                    <label for="fotoUrl" class="block text-sm font-medium text-slate-300 mb-1">URL da Foto Principal</label>
                    <input type="url" id="fotoUrl" name="fotoUrl" placeholder="https://..."
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div class="flex justify-end space-x-4 pt-4 border-t border-slate-700">
                    <a href="comando.html" class="px-6 py-2 rounded-lg text-slate-300 hover:bg-slate-700 transition-colors">Cancelar</a>
                    <button type="submit" class="px-6 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-bold transition-colors">
                        Guardar Registo
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
