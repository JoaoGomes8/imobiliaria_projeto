<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusitânia Astral | Montra Galáctica</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
 
    <header class="bg-slate-800 shadow-lg">
        <nav class="container mx-auto p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-bold text-blue-400 text-center sm:text-left">🚀 Lusitânia Astral</div>
            <ul class="flex flex-wrap justify-center space-x-4 sm:space-x-6 text-sm sm:text-base">
                <li><a href="index.html" class="hover:text-blue-300 transition-colors">Montra Galáctica</a></li>
                <li><a href="./comando.html" class="hover:text-blue-300 transition-colors">Centro de Comando</a></li>
            </ul>
        </nav>
    </header>
 
    <main class="container mx-auto p-6 mt-8">
        <section>
            <h1 class="text-3xl font-bold mb-8 text-center text-white">Explora os Nossos Planetas</h1>

            <div class="mb-8 flex flex-col sm:flex-row justify-between items-center bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-sm">
                <div class="w-full sm:w-auto">
                    <label for="filtro-recurso" class="text-sm font-medium text-slate-300 mr-2">Filtro de Habitabilidade:</label>
                    <select id="filtro-recurso" class="w-full sm:w-auto mt-2 sm:mt-0 bg-slate-900 text-white border border-slate-600 rounded-lg p-2 focus:outline-none focus:border-blue-500">
                        <option value="todos">Mostrar Todos</option>
                        <optgroup label="Fauna">
                            <option value="terrestre">Terrestre</option>
                            <option value="aviario">Aviário</option>
                            <option value="aquatico">Aquático</option>
                            <option value="marisco">Marisco</option>
                            <option value="insetos">Insetos</option>
                        </optgroup>
                        <optgroup label="Flora">
                            <option value="madeireira">Madeireira</option>
                            <option value="ornamental">Ornamental</option>
                        </optgroup>
                        <optgroup label="Geologia">
                            <option value="minerio">Minério</option>
                            <option value="gas">Gás</option>
                            <option value="liquido">Líquido</option>
                        </optgroup>
                    </select>
                </div>
            </div>
           
            <div id="grelha-planetas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </section>
    </main>
 
    <script src="app.js"></script>
</body>
</html>
