<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusitânia Astral | Centro de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-slate-800 shadow-lg">
        <nav class="container mx-auto p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-bold text-blue-400 text-center sm:text-left">🚀 Lusitânia Astral</div>
            <ul class="flex flex-wrap justify-center space-x-4 sm:space-x-6 text-sm sm:text-base">
                <li><a href="index.html" class="hover:text-blue-300 transition-colors">Montra Galáctica</a></li>
                <li><a href="comando.html" class="hover:text-blue-300 transition-colors text-blue-400">Centro de Comando</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto p-6 mt-8">
        <section>
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-white">Centro de Comando</h1>
                <a href="registo.html" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded transition-colors">
                    + Registar Descoberta
                </a>
            </div>
            
            <div class="overflow-x-auto bg-slate-800 rounded-xl shadow-lg border border-slate-700">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider border-b-2 border-slate-700 bg-slate-900/50">
                        <tr>
                            <th scope="col" class="px-6 py-4">ID</th>
                            <th scope="col" class="px-6 py-4">Nome</th>
                            <th scope="col" class="px-6 py-4">Vendedor</th>
                            <th scope="col" class="px-6 py-4">Preço (BTC)</th>
                            <th scope="col" class="px-6 py-4">Status</th>
                            <th scope="col" class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-planetas" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
