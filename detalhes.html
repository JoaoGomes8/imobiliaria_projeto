<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusitânia Astral | Detalhes do Planeta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
 
    <header class="bg-slate-800 shadow-lg">
        <nav class="container mx-auto p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-bold text-blue-400 text-center sm:text-left">🚀 Lusitânia Astral</div>
            <ul class="flex flex-wrap justify-center space-x-4 sm:space-x-6 text-sm sm:text-base">
                <li><a href="index.html" class="hover:text-blue-300 transition-colors">Montra Galáctica</a></li>
                <li><a href="comando.html" class="hover:text-blue-300 transition-colors">Centro de Comando</a></li>
            </ul>
        </nav>
    </header>
 
    <main class="container mx-auto p-6 mt-8" id="detalhes-planeta-container">
        <a href="index.html" class="inline-flex items-center text-blue-400 hover:text-blue-300 mb-6 transition-colors">
            <span>&larr; Voltar à Montra</span>
        </a>
 
        <div id="mensagem-carregamento" class="text-center text-slate-400 text-xl py-10">
            A descodificar coordenadas intergalácticas...
        </div>
 
        <div id="conteudo-detalhes" class="hidden">
            <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 overflow-hidden">
               
                <div class="p-8 border-b border-slate-700 md:flex justify-between items-start">
                    <div>
                        <h1 id="detalhe-nome" class="text-4xl font-bold text-white mb-2">Nome do Planeta</h1>
                        <p class="text-slate-400 text-lg flex items-center">
                            🌌 <span id="detalhe-localizacao" class="ml-2">Galáxia / Sistema</span>
                        </p>
                    </div>
                    <div class="mt-4 md:mt-0 text-right bg-slate-900 p-4 rounded-lg border border-slate-700">
                        <p id="detalhe-preco" class="text-3xl font-bold text-blue-400">0 BTC</p>
                        <p id="detalhe-euros" class="text-sm text-slate-500">≈ 0,00 €</p>
                    </div>
                </div>
 
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 p-8">
                    <div class="space-y-6">
                        <div>
                            <h3 class="text-xl font-semibold text-white mb-2">Descrição</h3>
                            <p id="detalhe-descricao" class="text-slate-300 leading-relaxed"></p>
                        </div>
                       
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-900 p-4 rounded-lg">
                                <span class="block text-sm text-slate-500 mb-1">Tipo de Parcela</span>
                                <span id="detalhe-parcela" class="font-medium text-slate-200"></span>
                            </div>
                            <div class="bg-slate-900 p-4 rounded-lg">
                                <span class="block text-sm text-slate-500 mb-1">Estado</span>
                                <span id="detalhe-estado" class="font-medium"></span>
                            </div>
                            <div class="bg-slate-900 p-4 rounded-lg">
                                <span class="block text-sm text-slate-500 mb-1">Área Total</span>
                                <span id="detalhe-areatotal" class="font-medium text-slate-200"></span>
                            </div>
                            <div class="bg-slate-900 p-4 rounded-lg">
                                <span class="block text-sm text-slate-500 mb-1">Vendedor</span>
                                <span id="detalhe-vendedor" class="font-medium text-slate-200"></span>
                            </div>
                        </div>
                    </div>
 
                    <div class="bg-slate-900 p-6 rounded-lg border border-slate-700">
                        <h3 class="text-xl font-semibold text-white mb-4">Recursos Naturais</h3>
                        <ul id="detalhe-recursos" class="space-y-3 text-slate-300">
                            </ul>
                    </div>
                </div>
 
                <div class="p-8 border-t border-slate-700 bg-slate-900/50">
                    <h3 class="text-xl font-semibold text-white mb-6">Galeria Orbital e de Superfície</h3>
                    <div id="galeria-fotos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        </div>
                </div>
 
            </div>
        </div>
    </main>
 
    <script src="app.js"></script>
</body>
</html>
